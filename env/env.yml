name: hfg
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch-cuda=12.1
  - pip:
      # 先从官方 cu121 索引拿 GPU 版 torch
      - --index-url https://download.pytorch.org/whl/cu121
      # 同时增加 PyPI 作为备用索引（用于装 torch-geometric）
      - --extra-index-url https://pypi.org/simple
      - torch==2.5.1
      # 从 PyG 的匹配页面拿 C++ 扩展轮子
      - --find-links https://data.pyg.org/whl/torch-2.5.1+cu121.html
      - pyg-lib
      - torch-scatter
      - torch-sparse
      - torch-cluster
      - torch-spline-conv
      # 纯 Python 包，可从 PyPI 装
      - torch-geometric
      # 其他依赖
      - networkx==3.2.1
      - matplotlib==3.8.4
      - scikit-learn==1.4.2
      - numpy==1.26.4
